name: Safe NPM Dependency Upgrade

on:
  schedule:
    # Daily at 1:00 AM UTC — patch only
    - cron: "0 1 * * *"
    # Weekly at 3:00 AM UTC on Sunday — safe minor
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:

  daily-patch:
    name: Daily Patch Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install baseline dependencies
        run: npm ci

      - name: Patch update only
        run: npm run deps:update:patch

      # - name: Run CI verification
      #   run: npm run ci:verify

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/deps-patch-upgrade
          title: "build(deps): patch dependency upgrade"
          commit-message: "build(deps): patch dependency upgrade"

  weekly-minor:
    name: Weekly Minor Update (Safe Libraries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install baseline dependencies
        run: npm ci

      - name: patch update (safe libs only)
        run: npm run deps:update:minor:patch

      # - name: Run CI verification
      #   run: npm run ci:verify

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/deps-minor-upgrade
          title: "build(deps): minor dependency upgrade"
          commit-message: "build(deps): minor dependency upgrade"

  angular-nx-migrate:
    name: Angular / NX Migration (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install baseline dependencies
        run: npm ci

      - name: Run Angular/NX migration
        run: |
          npx nx migrate latest
          npm install
          npx nx migrate --run-migrations
          npm run ci:verify

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/deps-angular-nx
          title: "build(deps): Angular/NX framework migration"
          commit-message: "build(deps): Angular/NX migration"