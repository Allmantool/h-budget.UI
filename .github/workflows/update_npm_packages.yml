name: Safe NPM dependency upgrade

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  upgrade-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install baseline deps
        run: npm ci

      - name: Snapshot dependency files
        run: |
          cp package.json package.json.bak
          cp package-lock.json package-lock.json.bak

      - name: Try dependency upgrade (minor)
        id: upgrade
        run: |
          npm run deps:update:minor
          npm i --package-lock-only
        continue-on-error: true

      - name: Reinstall deps after upgrade
        if: steps.upgrade.outcome == 'success'
        run: npm ci
        continue-on-error: true

      - name: Run full CI verification
        if: steps.upgrade.outcome == 'success'
        run: npm run ci:verify
        continue-on-error: true

      - name: Rollback on failure 🔥
        if: failure()
        run: |
          echo "Upgrade failed — rolling back"
          mv package.json.bak package.json
          mv package-lock.json.bak package-lock.json

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & create PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/deps-safe-upgrade
          title: "build(deps): safe npm dependency upgrade"
          commit-message: "build(deps): upgrade npm dependencies"
          body: |
            ✅ Automated dependency upgrade  
            - Minor versions only  
            - Full CI verification passed  
            - Nx + Angular validated
