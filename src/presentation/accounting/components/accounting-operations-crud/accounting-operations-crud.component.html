<div class="crud-content">
	<form [formGroup]="crudRecordFg">
		<div class="record-crud-header">
			<p class="record-crud-section-title">{{ crudModeLabelSignal() }}</p>
			<h3 class="record-crud-title">{{ crudTitleSignal() }}</h3>
			<p class="record-crud-copy">
				{{ isDraftRecordSignal() ? 'Create and save a new accounting operation.' : 'Update the selected
				operation or remove it if it is no longer needed.' }}
			</p>
		</div>
		<div class="date-section">
			<app-datepicker
				[disabled]="isNotReadyForSaveSignal()"
				placeholder="Choose a opeation date"
				formControlName="operationDate"
			></app-datepicker>
		</div>
		<div class="contractor-section">
			<app-form-field
				formControlName="contractor"
				[fieldType]="'SELECT'"
				[title]="'Contractor:'"
				[selectOptions]="getContractorsOptions"
				[disabled]="isNotReadyForSaveSignal()"
			></app-form-field>

			<button
				(click)="addContractor()"
				mat-fab
				color="primary"
				aria-label="add a contractor"
			>
				<mat-icon>add</mat-icon>
			</button>
		</div>

		<div class="category-section">
			<app-form-field
				formControlName="category"
				[fieldType]="'SELECT'"
				[title]="'Category:'"
				[selectOptions]="getCategoriesOptions"
				[disabled]="isNotReadyForSaveSignal()"
			></app-form-field>

			<button
				(click)="addCategory()"
				mat-fab
				color="primary"
				aria-label="add a category"
			>
				<mat-icon>add</mat-icon>
			</button>
		</div>

		<ng-container
			#expense
			*ngIf="isExpenseSignal(); else income"
		>
			<div class="expense-section">
				<app-form-field
					formControlName="expense"
					[fieldType]="'INPUT'"
					[title]="'Amount(Expense)::'"
					[disabled]="isNotReadyForSaveSignal()"
				></app-form-field>
			</div>
		</ng-container>

		<ng-template #income>
			<div class="income-section">
				<app-form-field
					formControlName="income"
					[fieldType]="'INPUT'"
					[title]="'Amount(Income):'"
					[disabled]="isNotReadyForSaveSignal()"
				></app-form-field>
			</div>
		</ng-template>

		<div class="comment-section">
			<app-form-field
				formControlName="comment"
				[fieldType]="'TEXT_AREA'"
				[title]="'Comments:'"
				[disabled]="isNotReadyForSaveSignal()"
			></app-form-field>
		</div>
		<div class="command-buttons">
			<app-button
				[isDisabled]="isNotReadyForSaveSignal()"
				(click)="saveRecordAsync()"
				type="fab"
				[text]="isDraftRecordSignal() ? 'Save record' : 'Save changes'"
				color="primary"
				icon="save"
			></app-button>
			<app-button
				[hidden]="false"
				(click)="addRecordAsync()"
				type="fab"
				text="New record"
				color="accent"
				icon="add_circle_outline"
			></app-button>
			<app-button
				[isDisabled]="isNotReadyForSaveSignal()"
				(click)="deleteRecordAsync()"
				type="fab"
				[text]="isDraftRecordSignal() ? 'Discard draft' : 'Delete record'"
				color="warn"
				icon="delete_forever"
			></app-button>
		</div>
	</form>
</div>
