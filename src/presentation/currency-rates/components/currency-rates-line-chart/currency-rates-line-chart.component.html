<div
	class="currency-rates-chart"
	[class.currency-rates-chart--busy]="(isChartInitialized$ | async) === false"
	[attr.aria-busy]="(isChartInitialized$ | async) === false"
>
	@if (isChartInitialized$ | async) {
	<apx-chart
		class="currency-rates-chart__canvas"
		[series]="chartOptions.series!"
		[chart]="chartOptions.chart!"
		[xaxis]="chartOptions.xaxis!"
		[title]="chartOptions.title!"
		[yaxis]="chartOptions.yaxis!"
	></apx-chart>
	} @if ((isChartInitialized$ | async) === false) {
	<div
		class="currency-rates-chart__loading-overlay"
		role="status"
		aria-live="polite"
		aria-label="Currency rate chart is loading"
	>
		<progress-spinner [isLoading]="true"></progress-spinner>
	</div>
	}
</div>
