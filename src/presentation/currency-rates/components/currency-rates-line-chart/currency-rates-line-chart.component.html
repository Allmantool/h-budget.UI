@if (isChartInitialized$ | async) {
<div class="currency-rates-chart">
	<apx-chart
		class="currency-rates-chart__canvas"
		[series]="chartOptions.series!"
		[chart]="chartOptions.chart!"
		[xaxis]="chartOptions.xaxis!"
		[title]="chartOptions.title!"
		[yaxis]="chartOptions.yaxis!"
	></apx-chart>
</div>
}

<div class="currency-rates-chart-spinner">
	<progress-spinner [isLoading]="(isChartInitialized$ | async) === false"></progress-spinner>
</div>
