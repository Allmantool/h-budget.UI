<mat-card class="dashboard-card-item">
	<div class="dashboard-card-item__media">
		<img
			class="dashboard-card-item__image"
			[src]="imagePath"
			[alt]="title"
		/>
	</div>

	<div class="dashboard-card-item__content">
		<p class="dashboard-card-item__subtitle">{{ subtitle }}</p>
		<h2 class="dashboard-card-item__title">{{ title }}</h2>
		<p class="dashboard-card-item__description">{{ description }}</p>
	</div>

	<div class="dashboard-card-item__footer">
		<button
			mat-flat-button
			color="primary"
			(click)="navigate()"
		>
			Open {{ title }}
		</button>
	</div>
</mat-card>
